name: Backend CI

on:
  push:
    branches:
      - main
      - dev/julian
      - dev/miguel
      - dev/santiago
  pull_request:
    branches:
      - main
      - dev/julian
      - dev/miguel
      - dev/santiago

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      normalization: ${{ steps.filter.outputs.normalization }}
      scrapper: ${{ steps.filter.outputs.scrapper }}
      model_product: ${{ steps.filter.outputs.model_product }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            normalization:
              - 'backend/normalization-service/**'
            scrapper:
              - 'backend/scrapping-service/**'
            model_product:
              - 'backend/microServiceModelProduct/**'

  test-normalization:
    name: Python tests (normalization-service)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect-changes
    if: needs.detect-changes.outputs.normalization == 'true'
    env:
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/shared/pyproject.toml
            backend/normalization-service/pyproject.toml
            backend/scrapping-service/pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install shared package
        run: pip install ./backend/shared

      - name: Install service test dependencies
        run: pip install "./backend/normalization-service[test]"

      - name: Run pytest
        working-directory: backend/normalization-service
        run: pytest tests -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results-normalization-service
          path: backend/normalization-service/test-results.xml

  test-scrapper:
    name: Python tests (scrapping-service)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect-changes
    if: needs.detect-changes.outputs.scrapper == 'true'
    env:
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/shared/pyproject.toml
            backend/normalization-service/pyproject.toml
            backend/scrapping-service/pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install shared package
        run: pip install ./backend/shared

      - name: Install service test dependencies
        run: pip install "./backend/scrapping-service[test]"

      - name: Install Playwright browser dependencies
        run: python -m playwright install --with-deps chromium

      - name: Run pytest
        working-directory: backend/scrapping-service
        run: pytest app/scraper/test -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results-scrapping-service
          path: backend/scrapping-service/test-results.xml

  test-intent-api-integration:
    name: Intent API integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: detect-changes
    if: needs.detect-changes.outputs.model_product == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/microServiceModelProduct/requirements.txt

      - name: Install test dependencies
        run: pip install pytest requests

      - name: Build and start integration stack
        run: docker compose up -d --build rabbitmq postgres model-product api

      - name: Wait for intent endpoint availability
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://127.0.0.1:8080/api/intent/intent" \
              -H "Content-Type: application/json" \
              -d '{"query":"auriculares samsung"}' || true)
            if [ "$http_code" = "200" ]; then
              echo "Intent endpoint is ready"
              exit 0
            fi
            echo "Intent endpoint not ready yet (attempt $i/60, status: $http_code)"
            sleep 5
          done

          echo "Intent endpoint did not become ready in time"
          docker compose ps
          docker compose logs --tail=200 api model-product postgres rabbitmq
          exit 1

      - name: Run intent integration pytest
        run: pytest backend/microServiceModelProduct/test/test_main.py -v --tb=short --junitxml=intent-test-results.xml

      - name: Upload integration test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results-intent-api-integration
          path: intent-test-results.xml

      - name: Upload integration stack logs
        if: failure()
        continue-on-error: true
        run: docker compose logs --tail=300 api model-product postgres rabbitmq > integration-stack.log

      - name: Archive integration stack logs
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: integration-stack-logs
          path: integration-stack.log

      - name: Stop integration stack
        if: always()
        run: docker compose down -v

  # Reserved for future Spring Boot services.
  # Enable this job when a Java service is added to backend/.
  test-java:
    name: Java tests (future)
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run Spring Boot tests
        run: |
          echo "Add Spring Boot test command here"
          # Example:
          # cd backend/your-spring-service
          # ./mvnw test
