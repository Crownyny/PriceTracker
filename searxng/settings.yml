# SearXNG settings for PriceTracker
# Documentación: https://docs.searxng.org/admin/settings/settings.html

use_default_settings: true

server:
  secret_key: "pricetracker-secret-change-in-production"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "es"
  formats:
    - html
    - json                # Requerido para la API REST del SearXNGDiscovery client

engines:
  # General — fuente principal con buenos resultados de e-commerce
  - name: google
    engine: google
    shortcut: g
    categories: general
    disabled: false
    weight: 2             # Peso mayor = más resultados de Google

  - name: bing
    engine: bing
    shortcut: b
    categories: general
    disabled: false
    weight: 2

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    categories: general
    disabled: false

  # Shopping — habilitado pero puede no estar disponible en todas las instancias
  - name: google shopping
    engine: google_shopping
    shortcut: gsp
    categories: shopping
    disabled: false

  - name: bing shopping
    engine: bing_shopping
    shortcut: bsp
    categories: shopping
    disabled: false

  # Deshabilitar motores no relevantes para reducir ruido
  - name: wikipedia
    disabled: true
  - name: wikidata
    disabled: true
  - name: arxiv
    disabled: true
  - name: github
    disabled: true

categories_as_tabs:
  general:
    - general
  shopping:
    - shopping
