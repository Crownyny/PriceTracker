# Integration and controller tests profile
scraping.daemon.enabled=false
mail.notifications.enabled=false

# Ensure schema initialization includes test compatibility patch.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema_v1.sql,classpath:schema_v2_scraping_queue.sql,classpath:schema_test_patch.sql

# Avoid external dependencies during generic tests
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.mail.host=localhost
spring.mail.port=1025
model.product.url=http://localhost
