# External Configuration
spring.config.import=optional:file:config/mail.properties

# Database Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/pricetracker
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema_v1.sql,classpath:schema_v2_scraping_queue.sql,classpath:schema_v3_wishlist.sql

# RabbitMQ Configuration
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Scraping daemon configuration
scraping.daemon.enabled=true
scraping.daemon.cron=0 * * * * *
scraping.daemon.capacity=100
scraping.daemon.lock-minutes=15
scraping.daemon.volatility.cron=0 0 3 * * *

# Model Product Configuration
model.product.url=${MODEL_PRODUCT_URL}

# Firebase Configuration
firebase.config.path=config/firebase-service-account.json

# Spring Retry Logging
logging.level.org.springframework.retry=DEBUG
