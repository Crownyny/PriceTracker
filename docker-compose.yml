services:

  # ── Frontend Angular ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/price-tracker
      dockerfile: Dockerfile
    container_name: pricetracker-frontend
    working_dir: /app
    volumes:
      - ./frontend/price-tracker:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NG_CLI_ANALYTICS: "false"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # ── Broker de mensajería ────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pricetracker-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ── PostgreSQL — productos normalizados e historial de precios ──────────────
  postgres:
    image: postgres:16-alpine
    container_name: pricetracker-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pricetracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  scrapper:
    build:
      context: ./backend
      dockerfile: scrapping-service/Dockerfile
    container_name: pricetracker-scrapper
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      API_HOST: "0.0.0.0"
      API_PORT: "8001"
      HTTP_TIMEOUT: "30.0"
      USER_AGENT: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
    ports:
      - "8001:8001"   # Health check: GET http://localhost:8001/health
    restart: unless-stopped

  # ── Normalizer Service ──────────────────────────────────────────────────────
  normalizer:
    build:
      context: ./backend
      dockerfile: normalization-service/Dockerfile
    container_name: pricetracker-normalizer
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/pricetracker"
      API_HOST: "0.0.0.0"
      API_PORT: "8002"
      # LLM local vía Ollama — desactivado temporalmente
      ENABLE_ENRICHER: "false"
      OPENAI_API_KEY: "ollama"
      OPENAI_MODEL: "qwen2:0.5b"
      OPENAI_BASE_URL: "http://ollama:11434/v1"
      ENABLE_SEMANTIC_VALIDATOR: "true"
      SEMANTIC_EMBEDDINGS_MODEL: "/models/all-MiniLM-L6-v2"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      SENTENCE_TRANSFORMERS_HOME: "/models"
      # Concurrencia del worker
      NORMALIZER_PREFETCH_COUNT: "1"
    ports:
      - "8002:8002"
    restart: unless-stopped

  # ── microServiceModelProduct ─────────────────────────────────────────────────
  model-product:
    build:
      context: ./backend
      dockerfile: microServiceModelProduct/Dockerfile
    container_name: pricetracker-model-product
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      API_HOST: "0.0.0.0"
      API_PORT: "8015"
    ports:
      - "8015:8015"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8015/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── API Service ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend/API
      dockerfile: Dockerfile
    container_name: pricetracker-api
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      model-product:
        condition: service_healthy
    environment:
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pricetracker
      DB_USER: postgres
      DB_PASSWORD: postgres
      # RabbitMQ Configuration
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      # Server Configuration
      SERVER_PORT: 8080
      JAVA_OPTS: "-Xmx512m -Xms256m"
      # Model Product Configuration
      MODEL_PRODUCT_URL: http://model-product:8015
    ports:
      - "8080:8080"   # API REST
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Caddy (HTTPS local para extension Chrome) ─────────────────────────────
  caddy:
    image: caddy:2.8
    container_name: pricetracker-caddy
    depends_on:
      api:
        condition: service_started
    ports:
      - "8443:8443"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped


volumes:
  frontend_node_modules:
  rabbitmq_data:
  postgres_data:
  caddy_data:
  caddy_config:
#  ollama_data: