#    restart: "no"

  # ── Scraper Service ─────────────────────────────────────────────────────────
  scrapper:
    build:
      context: ./backend
      dockerfile: scrapping-service/Dockerfile
    container_name: pricetracker-scrapper
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      API_HOST: "0.0.0.0"
      API_PORT: "8001"
      HTTP_TIMEOUT: "30.0"
      USER_AGENT: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
    ports:
      - "8001:8001"   # Health check: GET http://localhost:8001/health
    restart: unless-stopped

  # ── Normalizer Service ──────────────────────────────────────────────────────
  normalizer:
    build:
      context: ./backend
      dockerfile: normalization-service/Dockerfile
    container_name: pricetracker-normalizer
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/pricetracker"
      API_HOST: "0.0.0.0"
      API_PORT: "8002"
      # LLM local vía Ollama — desactivado temporalmente
      ENABLE_ENRICHER: "false"
      OPENAI_API_KEY: "ollama"
      OPENAI_MODEL: "qwen2:0.5b"
      OPENAI_BASE_URL: "http://ollama:11434/v1"
      # Concurrencia del worker
      NORMALIZER_PREFETCH_COUNT: "1"
    ports:
      - "8002:8002"   # Health check: GET http://localhost:8002/health
    restart: unless-stopped
  api:
    build:
      context: ./backend/API
      dockerfile: Dockerfile
    container_name: pricetracker-api
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pricetracker
      DB_USER: postgres
      DB_PASSWORD: postgres
      # RabbitMQ Configuration
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      # Server Configuration
      SERVER_PORT: 8080
      JAVA_OPTS: "-Xmx512m -Xms256m"
    ports:
      - "8080:8080"   # API REST
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped


volumes:
  rabbitmq_data:
  postgres_data:
#  ollama_data: